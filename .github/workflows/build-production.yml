name: Build and Push to Production Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare Deployment Files
        run: |
          # Create a temp directory for build package
          mkdir deploy-dist
          
          # Copy all recursive files except node_modules and git directories
          rsync -av --exclude='node_modules' --exclude='.git' --exclude='.github' --exclude='deploy-dist' ./ ./deploy-dist/
          
          # Write custom .gitignore for production branch so .next folder gets preserved and pushed
          cat << 'EOF' > ./deploy-dist/.gitignore
          node_modules
          .env*.local
          .env
          EOF

      - name: Deploy to production branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy-dist
          branch: production
          clean: true
