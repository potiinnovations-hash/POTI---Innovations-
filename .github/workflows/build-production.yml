name: Build and Push to Production Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare Deployment Files
        run: |
          # 1. Copy the critical client-side static assets and public assets into the standalone folder
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          
          # 2. Copy deployment configurations so they land in public_html root on checkout
          cp .htaccess .next/standalone/
          cp .cpanel.yml .next/standalone/

          # 3. Write a production-specific .gitignore so git preserves the standalone folders
          cat << 'EOF' > .next/standalone/.gitignore
          .env*.local
          .env
          EOF

      - name: Deploy to production branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .next/standalone
          branch: production
          clean: true
